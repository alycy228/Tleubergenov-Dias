<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="page centered">
    <section class="card xwide">
        <h2>Edit User</h2>
        <p class="muted">Обновите параметры выбранного пользователя.</p>
        <form class="form" method="post" th:action="@{/admin/edit/{id}(id=${user.id})}" th:object="${user}">
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}">
            </div>
            <div>
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>
            <div>
                <label>Account Number</label>
                <input type="text" th:field="*{accountNumber}">
            </div>
            <div>
                <label>Balance</label>
                <input type="number" step="0.01" th:field="*{balance}">
            </div>
            <div>
                <label>New Password</label>
                <input type="password" th:field="*{password}" placeholder="Leave empty to keep">
            </div>
            <div>
                <label>Currency</label>
                <select th:field="*{currency}">
                    <option value="KZT">KZT</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>
            <div>
                <label>Role</label>
                <input type="text" th:field="*{role}" placeholder="ADMIN or USER">
            </div>
            <div class="actions mt-8">
                <button class="btn primary" type="submit">Update</button>
                <a class="btn" href="/admin/users">Back to list</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
