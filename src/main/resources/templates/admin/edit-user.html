<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>
<h2>Edit User</h2>
<form method="post" th:action="@{/admin/edit/{id}(id=${user.id})}" th:object="${user}">
    <div>
        <label>Username</label>
        <input type="text" th:field="*{username}">
    </div>
    <div>
        <label>Account Number</label>
        <input type="text" th:field="*{accountNumber}">
    </div>
    <div>
        <label>Balance</label>
        <input type="number" step="0.01" th:field="*{balance}">
    </div>
    <div>
        <label>New Password</label>
        <input type="password" th:field="*{password}" placeholder="Leave empty to keep">
    </div>
    <div>
        <label>Currency</label>
        <select th:field="*{currency}">
            <option value="KZT">KZT</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="RUB">RUB</option>
            <option value="GBP">GBP</option>
        </select>
    </div>
    <div>
        <label>Role</label>
        <input type="text" th:field="*{role}" placeholder="ADMIN or USER">
    </div>
    <button type="submit">Update</button>
</form>
<p><a href="/admin/users">Back to list</a></p>
</body>
</html>
