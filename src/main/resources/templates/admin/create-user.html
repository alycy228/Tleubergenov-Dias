<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="page centered">
    <section class="card wide">
        <h2>Create User</h2>
        <p class="muted">Добавьте нового пользователя и задайте роль.</p>
        <form class="form" method="post" action="/admin/create" th:object="${user}">
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}">
            </div>
            <div>
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>
            <div>
                <label>Password</label>
                <input type="password" th:field="*{password}">
            </div>
            <div>
                <label>Account Number</label>
                <input type="text" th:field="*{accountNumber}">
            </div>
            <div>
                <label>Currency</label>
                <select th:field="*{currency}">
                    <option value="KZT">KZT</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="GBP">GBP</option>
                </select>
            </div>
            <div>
                <label>Role</label>
                <select th:field="*{role}">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="actions mt-8">
                <button class="btn primary" type="submit">Save</button>
                <a class="btn" href="/admin/users">Back to list</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
