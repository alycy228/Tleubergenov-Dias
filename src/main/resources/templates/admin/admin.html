<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="page">
    <header>
        <div>
            <h2>Users List</h2>
            <p class="muted">Управление пользователями системы.</p>
        </div>
        <a class="btn primary" href="/admin/create">Create User</a>
    </header>
    <section class="table-card">
        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td class="actions">
                    <a class="btn" th:href="@{/admin/edit/{id}(id=${user.id})}">Edit</a>
                    <a class="btn danger" th:href="@{/admin/delete/{id}(id=${user.id})}">Delete</a>
                </td>
            </tr>
        </table>
    </section>
    <div class="footer">
        <a class="btn" href="/home">Back</a>
    </div>
</main>
</body>
</html>
