<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="page">
    <h1>Профиль</h1>
    <p class="muted">Основные данные счета и настройки валюты.</p>
    <section class="grid mt-18">
        <div class="card">
            <div class="label">Пользователь</div>
            <div class="value" th:text="${username}">user</div>
        </div>
        <div class="card">
            <div class="label">Номер карты/счета</div>
            <div class="value" th:text="${accountNumber}">0000</div>
        </div>
        <div class="card">
            <div class="label">Баланс</div>
            <div class="value" th:text="${balance}">0.00</div>
        </div>
        <div class="card">
            <div class="label">Валюта</div>
            <div class="value" th:text="${currency}">KZT</div>
        </div>
    </section>
    <section class="card mt-18">
        <form class="form" method="post" action="/profile/currency">
            <label class="label" for="currency">Изменить валюту</label>
            <select id="currency" name="currency">
                <option value="KZT">KZT</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="RUB">RUB</option>
                <option value="GBP">GBP</option>
            </select>
            <button class="btn primary" type="submit">Сохранить</button>
        </form>
    </section>
    <div class="actions">
        <a class="btn" th:if="${isAdmin}" href="/admin/users">Админ меню</a>
        <a class="btn" href="/home">На главную</a>
        <a class="btn" href="/logout">Выйти</a>
    </div>
</main>
</body>
</html>
