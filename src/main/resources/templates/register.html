<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<main class="page centered">
    <section class="card medium">
        <h1>Регистрация</h1>
        <p class="muted">Создайте новый аккаунт и выберите валюту.</p>
        <form class="form" method="post" action="/register" th:object="${account}">
            <input type="text" th:field="*{username}" placeholder="Имя пользователя" autocomplete="username">
            <input type="password" th:field="*{password}" placeholder="Пароль" autocomplete="new-password">
            <input type="email" th:field="*{email}" placeholder="Email" autocomplete="email" required>
            <div class="muted" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            <input type="text" th:field="*{accountNumber}" placeholder="Номер счета/карты" autocomplete="off">
            <select th:field="*{currency}">
                <option value="KZT">KZT</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="RUB">RUB</option>
                <option value="GBP">GBP</option>
            </select>
            <div class="actions mt-8">
                <button class="btn primary" type="submit">Регистрация</button>
                <a class="link" href="/login">Есть аккаунт?</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
